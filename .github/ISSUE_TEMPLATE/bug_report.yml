name: Bug Report
description: Report an issue
labels: ["bug"]
body:        
  - type: textarea
    id: issue-description
    attributes:
      label: Issue Description
      description: Provide a clear and detailed description of the problem.
      placeholder: Describe what went wrong...
    validations:
      required: true
          
  - type: textarea
    id: script-log
    attributes:
      label: Upload script_log.txt
      description: Attach the `script_log.txt` file located at `C:\scriptdir`. Drag and drop the file or paste its contents here.
      placeholder: Paste log contents or attach the file...
      render: shell
    validations:
      required: false
      
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      description: Confirm the following before submitting.
      options:
        - label: I have verified this is a new issue (not a duplicate)
          required: true
        - label: I have attached the `script_log.txt` file from `C:\scriptdir`
          required: true